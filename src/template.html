<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-group">
                <div class="sidebar-icon-close">
                    <img class ="sidebar-icon-img" src="./assets/sidebar.svg" alt="sidebar icon">
                </div>
                <div class="tasks-group">
                    <p>Projects</p>
                </div>
            </div>
        </aside>
        <div class="todo-area">
            <div class="header">
                <div class="sidebar-icon-open">
                    <img class ="sidebar-icon-img" src="./assets/sidebar.svg" alt="sidebar icon">
                </div>
                <div class="add-todo">
                    <button class="todo-create">Add Todo</button>
                </div>
            </div>
            <div class="todos">
                Latest Activity
            </div>
        </div>
    </div>
</body>
</html>
